<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Visual Design</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<div class="container">

<div class="icon">🤖🎨⚡</div>

<h1>ИИ арқылы визуалды дизайн әлемі</h1>

<p class="desc">Interactive AI Assistant Project</p>

<button class="startBtn" onclick="startBot()">START AI ASSISTANT</button>

<!-- CHAT -->
<div id="chatBox" class="chatBox">
<div id="chatLog"></div>

<div class="inputBox">
<input id="userInput" placeholder="Сұрақ жаз..." />
<button onclick="sendMsg()">➤</button>
</div>
</div>

<!-- QUESTIONS -->
<h3>📌 Дайын сұрақтар</h3>

<div class="questions">

<button onclick="ask('q1')">ИИ деген не?</button>
<button onclick="ask('q2')">AI дизайн</button>
<button onclick="ask('q3')">Қайда қолданылады?</button>
<button onclick="ask('q4')">Логотип жасай ма?</button>
<button onclick="ask('q5')">AI болашағы</button>

<button onclick="ask('q6')">Сен не істейсің?</button>
<button onclick="ask('q7')">Постер</button>
<button onclick="ask('q8')">Дизайн</button>
<button onclick="ask('q9')">AI адамды алмастыра ма?</button>
<button onclick="ask('q10')">Қауіпсіз бе?</button>

<button onclick="ask('q11')">Мысал</button>
<button onclick="ask('q12')">Үйрену</button>
<button onclick="ask('q13')">Сурет</button>
<button onclick="ask('q14')">Видео</button>
<button onclick="ask('q15')">Пайда</button>

<button onclick="ask('q16')">Студент</button>
<button onclick="ask('q17')">Дизайнер</button>
<button onclick="ask('q18')">Салалар</button>
<button onclick="ask('q19')">Қазіргі AI</button>
<button onclick="ask('q20')">Қорытынды</button>

</div>

<!-- TEAM -->
<h3>👨‍💻 Топ мүшелері</h3>

<div class="team">

<div class="card" onclick="showInfo('a1')">Азаматұлы Али</div>
<div class="card" onclick="showInfo('a2')">Аманбай Жанель</div>
<div class="card" onclick="showInfo('a3')">Таңат Айбек</div>
<div class="card" onclick="showInfo('a4')">Бейсенбай Рауан</div>
<div class="card" onclick="showInfo('a5')">Омар Сұлужан</div>

</div>

<div id="infoBox" class="infoBox">Адамды таңдаңыз 👆</div>

</div>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
