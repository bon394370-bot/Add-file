<!DOCTYPE html>
<html lang="kk">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Visual Design World</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="container">

<h1>🤖 ИИ арқылы визуалды дизайн әлемі</h1>
<p>AI Interactive Assistant Project</p>

<button class="start" onclick="startBot()">START BOT</button>

<!-- CHAT -->
<div id="chatBox" class="chat">

<div id="chatLog"></div>

<div class="inputBox">
<input id="userInput" placeholder="Сұрақ жазыңыз..." />
<button onclick="sendMsg()">➤</button>
</div>

</div>

<h2>📌 10 СҰРАҚ</h2>

<div class="questions">

<button onclick="ask('q1')">ИИ деген не?</button>
<button onclick="ask('q2')">AI дизайн</button>
<button onclick="ask('q3')">Қайда қолданылады?</button>
<button onclick="ask('q4')">Логотип</button>
<button onclick="ask('q5')">Сурет</button>

<button onclick="ask('q6')">Видео</button>
<button onclick="ask('q7')">Адамды алмастыра ма?</button>
<button onclick="ask('q8')">Пайда</button>
<button onclick="ask('q9')">Қауіпсіз бе?</button>
<button onclick="ask('q10')">Болашағы</button>

</div>

<h2>👨‍💻 Топ мүшелері</h2>

<div class="team">

<div class="card" onclick="showRole('a1')">Аманбай Жанель</div>

<div class="card" onclick="showRole('a2')">Азаматұлы Али</div>

<div class="card" onclick="showRole('a3')">Омар Сұлужан</div>

<div class="card" onclick="showRole('a4')">Таңат Айбек</div>

<div class="card" onclick="showRole('a5')">Бейсенбай Рауан</div>

<div class="card" onclick="showRole('a6')">Абдукарим Рамазан</div>

</div>

<div id="infoBox" class="infoBox">
Адамды басыңыз 👆
</div>

</div>

<audio id="clickSound"
src="https://www.soundjay.com/buttons/sounds/button-16.mp3">
</audio>

<script src="script.js"></script>

</body>
</html>
